    </linearGradient>
  </defs>
  <rect x="96" y="96" width="832" height="832" rx="196" fill="url(#gPlane)" filter="url(#softShadow)"/>
  <rect x="106" y="106" width="812" height="812" rx="186" fill="url(#glass)" opacity="0.42"/>
  <path d="M190 250C330 135 650 120 820 300" stroke="white" stroke-opacity="0.25" stroke-width="28" stroke-linecap="round"/>
  
  <g filter="url(#glow)">
    <ellipse cx="512" cy="512" rx="285" ry="158" transform="rotate(-22 512 512)" stroke="#FFFFFF" stroke-width="58" stroke-linecap="round"/>
    <path d="M185 540C245 415 335 402 420 505C505 608 575 606 650 492C725 378 817 414 866 540" stroke="#FFFFFF" stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>
