<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gPlane" x1="160" y1="120" x2="880" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#39A8FF"/>
      <stop offset="1" stop-color="#7B5CFF"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="glow" x="-120" y="-120" width="1264" height="1264" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="glass" x1="250" y1="120" x2="820" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.11"/>
